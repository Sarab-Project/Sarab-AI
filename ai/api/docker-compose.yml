services:
  whisper:
    image: whisper-api:v1
    ports:
      - "9000:9000"
    environment:
      - ASR_MODEL=small

  llm:
    image: voicesystem-api:v1
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - whisper

  segformer:
    image: segformer-pipeline:v2
    ports:
      - "10000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
